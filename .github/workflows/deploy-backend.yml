name: Deploy Backend (NAS)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "deploy" to confirm deployment
        required: true

jobs:
  pre-flight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'deploy' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ambient
          POSTGRES_PASSWORD: ambient
          POSTGRES_DB: ambient_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://ambient:ambient@localhost:5432/ambient_ci

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=./prisma/schema.prisma

      - name: Run migrations (CI database)
        run: npx prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to NAS via SSH
    runs-on: ubuntu-latest
    needs: pre-flight

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_SSH_PORT }}
          script: |
            set -e

            cd ${{ secrets.NAS_PROJECT_DIR }}

            echo "Pulling latest changes..."
            git pull origin main

            echo "Installing API dependencies..."
            cd apps/api
            npm ci --omit=dev

            echo "Generating Prisma client..."
            npx prisma generate --schema=./prisma/schema.prisma

            echo "Running database migrations..."
            npx prisma migrate deploy --schema=./prisma/schema.prisma

            echo "Restarting backend service..."
            if command -v docker &> /dev/null && docker ps --format '{{.Names}}' | grep -q ambient-api; then
              docker restart ambient-api
            else
              pm2 restart ambient-api || pm2 start dist/main.js --name ambient-api
            fi

            echo "Deploy complete."

  verify:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 10

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            --retry 5 \
            --retry-delay 5 \
            --retry-connrefused \
            "http://${{ secrets.NAS_HOST }}:${{ secrets.NAS_API_PORT }}/health")

          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed — HTTP $STATUS"
            exit 1
          fi

          echo "Health check passed — HTTP $STATUS"
